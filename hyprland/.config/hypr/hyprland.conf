# --------------------------------------------
# Monitor - Fix scaling (1.0 = native, no scaling)
# --------------------------------------------
monitor = eDP-1, 1920x1080@60, 0x0, 1.0

# --------------------------------------------
# Variables
# --------------------------------------------
$mod = SUPER
$term = ghostty
$menu = wofi --show drun

# --------------------------------------------
# Performance - Disable all effects
# --------------------------------------------
# No animations
general {
    border_size = 0
    no_border_on_floating = true
    gaps_in = 0
    gaps_out = 0
    col.active_border = rgb(888888)
    col.inactive_border = rgb(000000)
    layout = dwindle
}

decoration {
    rounding = 0
    blur {
        enabled = false
    }
    shadow {
        enabled = false
    }
}

animations {
    enabled = false
}

# --------------------------------------------
# Input
# --------------------------------------------
input {
    kb_layout = us
    kb_options = caps:ctrl_modifier
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

# --------------------------------------------
# General Settings
# --------------------------------------------
general {
    allow_tearing = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    vfr = true
}

# --------------------------------------------
# Window Rules - No borders
# --------------------------------------------
windowrulev2 = noborder, class:.*
windowrulev2 = float, class:^(wofi)$
windowrulev2 = float, class:^(pavucontrol)$

# --------------------------------------------
# Autostart
# --------------------------------------------
exec-once = waybar

# --------------------------------------------
# Keybindings
# --------------------------------------------

# Window management
bind = $mod, Return, exec, $term
bind = $mod, Space, exec, $menu
bind = $mod SHIFT, c, killactive
bind = $mod SHIFT, Space, togglefloating
bind = $mod, Tab, cyclenext
bind = $mod SHIFT, q, exit
bind = $mod SHIFT, r, exec, hyprctl reload

# Workspace switching (mod + number)
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

# Move to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# Ctrl+Left/Right workspace switching
bind = CTRL, Right, exec, $HOME/.config/hypr/right_workspace.sh
bind = CTRL, Left, exec, $HOME/.config/hypr/left_workspace.sh

# Multi-monitor navigation
bind = $mod, Left, focusmonitor, l
bind = $mod, Right, focusmonitor, r
bind = $mod SHIFT, Left, movewindow, l
bind = $mod SHIFT, Right, movewindow, r

# Toggle waybar
bind = $mod, b, exec, $HOME/.config/hypr/toggle_waybar.sh

# --------------------------------------------
# Mouse bindings
# --------------------------------------------
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# --------------------------------------------
# Gestures (if supported)
# --------------------------------------------
gesture = 3, right, dispatcher, exec, $HOME/.config/hypr/left_workspace.sh
gesture = 3, left, dispatcher, exec, $HOME/.config/hypr/right_workspace.sh
